name: CI/CD

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true
      # .env is a bundled pubspec asset; analyze/test need it to exist
      - run: cp .env.example .env
      - run: flutter pub get
      # Errors/warnings fail the build; the pre-existing info-level lints
      # (deprecations, style) are tracked debt and don't block CI.
      - run: flutter analyze --no-fatal-infos
      - run: flutter test

  # Mobile builds validate the android/ and ios/ platform configs on every
  # change; the Android APK is also uploaded as an installable artifact.
  # Config values baked into these builds come from the same Actions variables
  # as the web deploy (public in the bundle by design); PR builds from forks
  # fall back to .env.example.
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true
      - name: Write .env (repo variables, else template)
        run: |
          if [ -n "${{ vars.API_BASE_URL }}" ]; then
            {
              echo "API_BASE_URL=${{ vars.API_BASE_URL }}"
              echo "SUPABASE_URL=${{ vars.SUPABASE_URL }}"
              echo "SUPABASE_ANON_KEY=${{ vars.SUPABASE_ANON_KEY }}"
            } > .env
          else
            cp .env.example .env
          fi
      - run: flutter pub get
      # Signed with the debug key unless android/key.properties exists
      # (see android/key.properties.example); fine for direct installs.
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: splitllm-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  build-ios:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true
      - name: Write .env (repo variables, else template)
        run: |
          if [ -n "${{ vars.API_BASE_URL }}" ]; then
            {
              echo "API_BASE_URL=${{ vars.API_BASE_URL }}"
              echo "SUPABASE_URL=${{ vars.SUPABASE_URL }}"
              echo "SUPABASE_ANON_KEY=${{ vars.SUPABASE_ANON_KEY }}"
            } > .env
          else
            cp .env.example .env
          fi
      - run: flutter pub get
      # No Apple signing credentials in CI; this validates the iOS project
      # compiles and links. Store/TestFlight builds are made from Xcode.
      - run: flutter build ios --release --no-codesign

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    concurrency: catalyst-deploy
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true
      # Runtime config: bundled as the .env asset and passed as dart-defines
      # by build_client.sh. These are public in the JS bundle by design, so
      # they live in Actions *variables*, not secrets.
      - name: Write .env from repo variables
        run: |
          {
            echo "API_BASE_URL=${{ vars.API_BASE_URL }}"
            echo "SUPABASE_URL=${{ vars.SUPABASE_URL }}"
            echo "SUPABASE_ANON_KEY=${{ vars.SUPABASE_ANON_KEY }}"
          } > .env
      - name: Build web app (--base-href /app/) and stage into client/
        run: sh scripts/build_client.sh
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Deploy to Catalyst
        run: |
          npm install -g zcatalyst-cli
          catalyst --token "$CATALYST_TOKEN" --project SplitLLM --org 60078340202 --dc in deploy
        env:
          CATALYST_TOKEN: ${{ secrets.CATALYST_TOKEN }}
