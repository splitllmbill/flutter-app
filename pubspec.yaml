name: splitllm
description: SplitLLM - Smart Bill Splitting App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Web-only URL strategy (conditionally imported; not compiled on mobile).
  flutter_web_plugins:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2

  # Routing
  go_router: ^17.1.0

  # HTTP Client
  dio: ^5.4.0

  # Supabase (Auth and Database)
  supabase_flutter: ^2.6.0

  # UI
  fl_chart: ^1.1.1
  qr_flutter: ^4.1.0
  google_fonts: ^8.0.2

  # Utilities
  flutter_dotenv: ^5.1.0
  intl: ^0.20.2
  shared_preferences: ^2.2.2
  # Reads the running app's version to compare against GET /version.
  package_info_plus: ^8.0.0
  url_launcher: ^6.2.3
  image_picker: ^1.0.7
  file_picker: ^11.0.2

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.7
  riverpod_generator: ^4.0.3
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

# App icons for Android/iOS. Source PNGs come from scripts/generate_app_icon.py;
# regenerate with: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/app_icon.png
  remove_alpha_ios: true
  adaptive_icon_background: "#121212"
  adaptive_icon_foreground: assets/icon/app_icon_foreground.png

# Native splash screens (Android incl. 12+, iOS). Regenerate with:
# dart run flutter_native_splash:create
flutter_native_splash:
  color: "#121212"
  image: assets/icon/splash_icon.png
  android_12:
    color: "#121212"
    image: assets/icon/splash_icon_android12.png
  web: false

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    # Runtime configuration (Supabase/API). Copied from .env.example locally; in
    # CI it's written from GitHub Actions variables before the build. Git-ignored.
    - .env
